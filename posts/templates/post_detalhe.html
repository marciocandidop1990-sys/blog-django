{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1>{{ post.titulo }}</h1>

    <p class="text-muted">
        Publicado em {{ post.data_publicacao|date:"d/m/Y H:i" }}
    </p>

    {% if post.imagem %}
        <img src="{{ post.imagem.url }}" class="img-fluid mb-3">
    {% endif %}

    <p>{{ post.conteudo }}</p>

    <a href="/" class="btn btn-secondary">Voltar</a>

</div>

{% endblock %}
